<html>
    <head>
        <title>Multiplicação Java</title>
    </head>
    <Body>

            <label for="text">N1</label>
            <input type="number" id="N1"><br>
            <label for="text">N2</label>
            <input type="number" id="N2"><br>
            <button id="Bot" onclick="Mult()">Multiplicar</button>
        

        <script>
            function Mult() {
                let N1=Number(document.getElementById("N1").value);
                let N2=Number(document.getElementById("N2").value);
                let Multi=N1*N2;

                alert("A Multiplicação é:"  +  Multi);
            }
        </script>
    </Body>
</html>
