<html>
    <head>
        <title>Soma Java</title>
    </head>
    <Body>
    
            <label for="text">N1</label>
            <input type="number" id="N1"><br>
            <label for="text">N2</label>
            <input type="number" id="N2"><br>
            <button id="Bot" onclick="Somar()">Somar</button>
        

        <script>
            function Somar(){
                let N1=Number(document.getElementById("N1").value);
                let N2=Number(document.getElementById("N2").value);
                let soma=N1+N2;
                let media=soma/2
                if (media >= 7){
                    alert("Aprovado")
                }

                else if (media >= 5 & media < 7){
                    alert("Recuperando")
                }

                else{
                    alert("Reprovado")
                }                

            }
        </script>
    </Body>
</html>
